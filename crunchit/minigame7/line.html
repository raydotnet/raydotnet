                <video class = "gif"> <source src = "../backgrounds/itgetsyou.mp4" type = "video/mp4"></video>

            <div class="questionmark four4" onclick="showOne()">?</div>

            <div class="questionmark six6" onclick="nopeFour()">?</div>

            <div class = "nope one">nope</div>

            <div class = "nope four">nope</div>
            <div class = "nope five">nope</div>
            <div class = "nope six">nope</div>
            
            <div class="dialogue line1">

                <div class="text">seven</div> 
            </div>
            </div>

            <div class="dialogue line2">

                <div class="greghead"></div>

            </div>

            <div class="dialogue line3">

            <div class="body"> 
                <div class="greghead"></div>
                <div class="text">bye</div> 
            </div>
            </div>

            <div class="dialogue intro"> 
            <div class="header" style="background-color: #da1c44"><span class="name">You</span><button class="button1" onclick="hideIntro()">x &nbsp;</button></div>
            <div class="introbody"> 
                <div class="yourhead"></div>
                <div class="text">Walk around to add more blue to your life. The more blue you add, the more secrets you might uncover...</div> 
            </div>
        </div>

            <div class="time">60</div>
            
        </div>
